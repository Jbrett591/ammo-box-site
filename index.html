<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Ammo Boxes</title>

<style>
.header {
  text-align: center;
  margin-bottom: 30px;
}

  html {
  scroll-behavior: smooth;
}
  
.logo {
  max-width: 1000px;
  height: auto;
  margin-bottom: 10px;
}

.tagline {
  color: #aaa;
  font-size: 14px;
  letter-spacing: 1px;
  margin-top: -5px;
}

body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #eee;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1, h2 { 
  text-align: center; 
}

.section {
  margin-top: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px; 
}

  .color-grid {
  grid-template-columns: repeat(auto-fill, 50px);
  gap: 6px;
  justify-content: center;
}

.card {
  border: 1px solid #333;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  background: #1a1a1a;
  transition: 0.2s;
}

.card:hover { 
  border-color: #666; 
}

.selected {
  border: 2px solid #4caf50 !important;
  box-shadow: 0 0 10px #4caf50;
  transform: scale(1.03);
}

.color-swatch {
   width: 50px;
  height: 50px;
  border: 1px solid #333;
  cursor: pointer;
  transition: 0.2s;
  border-radius: 10px;
  position: relative;   
  display: flex;
  align-items: center;
  justify-content: center;

}

  .color-swatch::before {
  content: attr(data-value);
  position: absolute;
  bottom: 58px;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: #fff;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
  z-index: 10;
}

.color-swatch:hover::before {
  opacity: 1;
}
  
  .color-swatch:hover {
  transform: scale(1.08);
}
  
  .color-swatch.light::after {
  color: black;
}

  .color-swatch::after {
  content: "✔";
  color: white;
  font-size: 20px;
  opacity: 0;
  transform: scale(0.5);
  transition: 0.2s;
}

.color-swatch.selected::after {
  opacity: 1;
  transform: scale(1);
}

  .color-swatch.selected {
  border: 2px solid #4caf50 !important;
  box-shadow: 0 0 10px #4caf50;

}

input,
textarea {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
  font-size: 15px;
}

.contact-input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #4caf50;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #43a047;
}

.summary {
  background: #1a1a1a;
  padding: 15px;
  margin-top: 20px;
  border: 1px solid #333;
}

  @media (max-width: 600px) {
  
  .section {
    margin-top: 20px;
  }

    .summary {
    font-size: 14px;
    }
    
  body {
    padding: 10px;
  }

  .logo {
    max-width: 100%;
  }

  h2 {
    font-size: 18px;
  }

  /* Cards (Pistol, Rifle, etc.) */
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .card {
    padding: 14px;
    font-size: 16px;
  }

  /* Color swatches */
  .color-grid {
    grid-template-columns: repeat(auto-fill, 44px);
    gap: 6px;
  }

  .color-swatch {
    width: 44px;
    height: 44px;
  }

  /* Inputs */
  .contact-input {
    font-size: 16px;
  }

  textarea {
    font-size: 16px;
  }

  /* Button */
  button {
    font-size: 18px;
    padding: 16px;
  }

}
</style>
</head>

<body>

<div class="header">
  <img src="images/forgebox logo.png" alt="ForgeBox Co." class="logo">
</div>

<!-- CATEGORY -->
<div class="section">
  <h2>1. Select Category</h2>
  <div class="grid" id="category">
    <div class="card" data-value="Pistol">Pistol</div>
    <div class="card" data-value="Rifle">Rifle</div>
    <div class="card" data-value="Shotgun">Shotgun</div>
  </div>
</div>

<!-- CALIBER -->
<div class="section">
  <h2>2. Select Caliber</h2>
  <div class="grid" id="caliber"></div>
</div>

<!-- CAPACITY -->
<div class="section">
  <h2>3. Capacity</h2>
  <div class="grid" id="capacity"></div>
</div>

<!-- COLORS -->
<div class="section">
  <h2>4. Box Color</h2>
  <div class="grid color-grid" id="boxColor"></div>

  <h2>5. Text Color</h2>
  <div class="grid color-grid" id="textColor"></div>
</div>

<!-- NOTES -->
<div class="section">
  <h2>6. Custom Notes</h2>
  <textarea id="notes" name="Custom Notes" style="width:100%; height:80px;"></textarea>
</div>

<!-- CONTACT INFO -->
<div class="section">
  <h2>7. Contact Info</h2>
  <input id="customerName" class="contact-input" type="text" placeholder="Name" required>
  <input id="customerEmail" class="contact-input" type="email" placeholder="Email" required>
  <input id="customerPhone" class="contact-input" type="tel" placeholder="Phone">
</div>

<!-- SUMMARY -->
<div class="summary" id="summary">
  <strong>Order Summary:</strong>
  <div id="summaryText">Nothing selected</div>
</div>

<button type="button" onclick="submitOrder()">Submit Order</button>

<script>
// PRODUCT DATA
const products = {
  Pistol: {
    ".22 LR": [28, 50, 66, 100, 105, 120, 150, 250],
    ".22 MAG": [50, 100, 250],
    ".22 WMR": [50, 100, 250],
    "9mm": [50, 66, 100, 102],
    "10mm": [50, 105],
    ".25 ACP": [50],
    ".30 LUGER": [50],
    ".32 ACP": [50],
    ".32 S&W LONG": [50],
    ".327 FEDERAL MAG": [50],
    ".357 MAGNUM": [50, 66, 96, 102],
    ".357 SIG [50],
    ".380": [50, 66, 102],
    ".38 SPECIAL": [50, 66, 96],
    ".38 SPECIAL WADCUTTER": [50],
    ".38 SUPER [50],
    ".38 TPC [50],
    ".40 S&W": [50, 105],
    ".41 MAGNUM [50],
    ".44 MAGNUM [50, 105],
    ".45 ACP": [50, 66, 105],
    ".45 LONG COLT [50],
    "5.7x28": [50, 100]
  },

  Rifle: {
    ".17 HMR": [50, 100],
    ".17 HORNET": [50],
    ".17 MACH 2": [100],
    ".17 WSM": [50],
    ".21 SHARP": [50, 100, 250],
    ".218 BEE": [50],
    ".22 LR": [28, 50, 66, 100, 105, 120, 150, 250],
    ".22 MAG": [50, 100, 250],
    ".22 ARC": [20, 50, 105],
    ".22 CREEDMOOR": [20, 50],
    ".22 HORNET": [50],
    ".22 WMR": [50, 100, 250],
    ".22 SHORT": [66, 100,],
    ".22-250 REM": [20, 50],
    ".204 Ruger": [20, 50, 100],
    ".220 SWIFT": [20],
    ".222 REM": [20, 50],
    ".222 REM MAG": [20, 50],
    ".223 / 5.56": [20, 50, 60],
    ".224 VALKYRIE": [20, 50],
    ".243 WIN": [20, 25, 50],
    "25-06": [20],
    ".257 WEATHERBY": [20, 50],
    ".270 WEATHERBY MAG": [20, 50],
    ".270 WIN": [20, 50, 105],
    ".270 WSM": [20, 50],
    ".28 NOSLER": [20],
    ".280 AI": [20],
    ".28O REMINGTON": [20],
    ".284 WIN": [20],
    ".30 CARBINE": [50, 100],
    "30-30 WIN": [20, 50],
    "30-06": [20, 50],
    ".300 Blackout": [20, 50, 60, 100],
    ".300 PRC": [20, 50],
    ".300 RUM": [20, 50],
    ".300 WIN MAG": [20, 50],
    ".300 WSM": [20, 50],
    ".303 BRITISH": [20, 50],
    ".308 WIN": [50, 105],
    "32-20 WIN": [50, 102],
    ".338 EDGE": [20, 50],
    ".338 LAPUA": [20, 50],
    ".338 EDGE": [20, 50],
    ".338 NORMA": [20, 50],
    ".338 RUM": [20],
    ".338 WIN MAG": [20, 50],
    ".340 WBY MAG": [20],
    ".35 REM": [20],
    ".35 WHELEN": [20, 50],
    ".350 LEGEND": [20, 50],
    ".357 H&H MAG": [20],
    ".360 BUCKHAMMER": [20],
    ".400 LEGEND": [20, 50],
    ".444 MARLIN": [20],
    "6.5 Creedmoor": [20, 50, 105],
    "6MM ARC": [20, 50, 105],
    
    "7.62x39": [20, 50, 60, 105],
    "50 BMG": [10]
  },

  Shotgun: {
    ".410 2-1/2 inch": [25],
    ".410 3 inch": [25],
    "28 Gauge 3 inch": [25]
    "20 Gauge 2-3/4 inch": [25],
    "20 Gauge 3 inch": [25],
    "16 Gauge 2-3/4 inch": [25],
    "12 Gauge 2-3/4 inch": [10, 25],
    "12 Gauge 3 inch": [10, 25],
    "10 Gauge 3-1/2 inch": [25]
  }
};

const colors = {
  "Black": "#000000",
  "OD Green": "#4b5320",
  "FDE": "#c2b280",
  "Gray": "#888888",
  "White": "#f5f5f5",
  "Red": "#b22222",
  "Blue": "#1f4e79"
};

const selections = {};

// GENERIC SELECT HANDLER
function selectHandler(container, key) {
  container.querySelectorAll(".card").forEach(card => {
    card.onclick = () => {
      container.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");

      selections[key] = card.dataset.value;

  if (key === "category") {
  selections.caliber = "";
  selections.capacity = "";
  document.getElementById("capacity").innerHTML = "";
  loadCalibers();

  document.getElementById("caliber").scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

if (key === "caliber") {
  selections.capacity = "";
  loadCapacity();

  document.getElementById("capacity").scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

if (key === "capacity") {
  document.getElementById("boxColor").scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

      updateSummary();
    };
  });
}

// LOAD CALIBERS
function loadCalibers() {
  const container = document.getElementById("caliber");
  container.innerHTML = "";

  const calibers = Object.keys(products[selections.category] || {});

  calibers.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.value = c;
    div.innerText = c;
    container.appendChild(div);
  });

  selectHandler(container, "caliber");
}

// LOAD CAPACITY
function loadCapacity() {
  const container = document.getElementById("capacity");
  container.innerHTML = "";

  const caps = products[selections.category][selections.caliber] || [];

  caps.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.value = c;
    div.innerText = c + " rounds";
    container.appendChild(div);
  });

  selectHandler(container, "capacity");
}

// LOAD COLORS
function loadColors(id, key) {
  const container = document.getElementById(id);

 Object.entries(colors).forEach(([name, val]) => {
  const div = document.createElement("div");
  div.className = "color-swatch";
  div.style.background = val;
  div.dataset.value = name;
  div.title = name;

  // detect light vs dark color
  const r = parseInt(val.substr(1,2),16);
  const g = parseInt(val.substr(3,2),16);
  const b = parseInt(val.substr(5,2),16);

  const brightness = (r * 299 + g * 587 + b * 114) / 1000;

  if (brightness > 150) {
    div.classList.add("light"); // light background → black checkmark
  }

  div.onclick = () => {
    container.querySelectorAll(".color-swatch")
      .forEach(c => c.classList.remove("selected"));

    div.classList.add("selected");
    selections[key] = name;
    updateSummary();
  };

  container.appendChild(div);
});
}

// SUMMARY
function updateSummary() {
  const notes = document.getElementById("notes").value || "";

  document.getElementById("summaryText").innerHTML = `
    Category: ${selections.category || "-"}<br>
    Caliber: ${selections.caliber || "-"}<br>
    Capacity: ${selections.capacity ? selections.capacity + " rounds" : "-"}<br>
    Box Color: ${selections.boxColor || "-"}<br>
    Text Color: ${selections.textColor || "-"}<br>
    Notes: ${notes || "-"}
  `;
}

// SUBMIT
async function submitOrder() {
  const name = document.getElementById("customerName").value.trim();
  const email = document.getElementById("customerEmail").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  const notes = document.getElementById("notes").value.trim();

  if (!selections.category || !selections.caliber || !selections.capacity) {
    alert("Please select a category, caliber, and capacity.");
    return;
  }

  if (!selections.boxColor || !selections.textColor) {
    alert("Please select a box color and text color.");
    return;
  }

  if (!name || !email) {
    alert("Please enter your name and email before submitting.");
    return;
  }

  const formData = new FormData();
  formData.append("Customer Name", name);
  formData.append("Customer Email", email);
  formData.append("Phone", phone);
  formData.append("Category", selections.category || "");
  formData.append("Caliber", selections.caliber || "");
  formData.append("Capacity", selections.capacity ? selections.capacity + " rounds" : "");
  formData.append("Box Color", selections.boxColor || "");
  formData.append("Text Color", selections.textColor || "");
  formData.append("Custom Notes", notes);
  formData.append("_subject", "New ForgeBox Order - " + new Date().toLocaleString());

  const response = await fetch("https://formspree.io/f/xjgjjjkq", {
    method: "POST",
    body: formData,
    headers: {
      "Accept": "application/json"
    }
  });

  if (response.ok) {
    alert("Order submitted! We’ll confirm details with you once we have a chance to review your order.");

    document.getElementById("customerName").value = "";
    document.getElementById("customerEmail").value = "";
    document.getElementById("customerPhone").value = "";
    document.getElementById("notes").value = "";

  } else {
    alert("Something went wrong. Please try again.");
  }
}

// INIT
selectHandler(document.getElementById("category"), "category");
loadColors("boxColor", "boxColor");
loadColors("textColor", "textColor");

document.getElementById("notes").addEventListener("input", updateSummary);
</script>

</body>
</html>
