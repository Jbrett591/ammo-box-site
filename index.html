<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom Ammo Boxes</title>

<style>
  .header {
  text-align: center;
  margin-bottom: 30px;
}

.logo {
  max-width: 220px;
  height: auto;
  margin-bottom: 10px;
}

.tagline {
  color: #aaa;
  font-size: 14px;
  letter-spacing: 1px;
  margin-top: -5px;
}
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #eee;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1, h2 { text-align: center; }

.section {
  margin-top: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px; 
}

.card {
  border: 1px solid #333;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  background: #1a1a1a;
  transition: 0.2s;
}

.card:hover { border-color: #666; }

.selected {
  border: 2px solid #4caf50;
}

.color-swatch {
  height: 40px;
  border: 1px solid #333;
  cursor: pointer;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #4caf50;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.summary {
  background: #1a1a1a;
  padding: 15px;
  margin-top: 20px;
  border: 1px solid #333;
}
</style>
</head>

<body>

<div class="header">
  <img src="images/logo.png" alt="ForgeBox Co." class="logo">
  <h1>ForgeBox Co.</h1>
  <p class="tagline">Made to Spec, Built to Last</p>
</div>

<!-- CATEGORY -->
<div class="section">
  <h2>1. Select Category</h2>
  <div class="grid" id="category">
    <div class="card" data-value="pistol">Pistol</div>
    <div class="card" data-value="rifle">Rifle</div>
    <div class="card" data-value="shotgun">Shotgun</div>
  </div>
</div>

<!-- CALIBER -->
<div class="section">
  <h2>2. Select Caliber</h2>
  <div class="grid" id="caliber"></div>
</div>

<!-- CAPACITY -->
<div class="section">
  <h2>3. Capacity</h2>
  <div class="grid" id="capacity"></div>
</div>

<!-- COLORS -->
<div class="section">
  <h2>4. Box Color</h2>
  <div class="grid" id="boxColor"></div>

  <h2>Text Color</h2>
  <div class="grid" id="textColor"></div>
</div>

<!-- NOTES -->
<div class="section">
  <h2>5. Custom Notes</h2>
  <textarea id="notes" style="width:100%; height:80px;"></textarea>
</div>

<!-- SUMMARY -->
<div class="summary" id="summary">
  <strong>Order Summary:</strong>
  <div id="summaryText">Nothing selected</div>
</div>

<button onclick="submitOrder()">Submit Order</button>

<script>
// PRODUCT DATA (expand later easily)
const products = {

    pistol: {
    ".22 LR": [28, 50, 66, 100, 105, 120, 150, 250],
    "9mm": [50, 66, 100, 102],
    "10mm": [50, 105],
    ".25 ACP": [50],
    ".32 ACP": [50],
    ".380 ACP": [50, 66, 102],
    ".38 Special": [50, 66, 96],
    ".357 Magnum": [50, 66, 96, 102],
    ".40 S&W": [50, 105],
    ".45 ACP": [50, 66, 105],
    "5.7x28": [50, 100],

  },

  rifle: {
    ".17 HMR": [50, 100],
    ".22 LR": [28, 50, 66, 100, 105, 120, 150, 250],
    ".22 Mag": [50, 100, 250],
    ".223 / 5.56": [20, 50, 60],
    ".204 Ruger": [20, 50, 100],
    ".243 Win": [20, 25, 50],
    ".270 Win": [20, 50, 105],
    ".308 Win": [50, 105],
    ".300 Blackout": [20, 50, 60, 100],
    "6.5 Creedmoor": [20, 50, 105],
    "6mm ARC": [20, 50, 105],
    "30-06": [20, 50],
    "7.62x39": [20, 50, 60, 105],
    "50 BMG": [10],
  },

  shotgun: {
    ".410 2-1/2 inch": [25],
    ".410 3 inch": [25],
    "20 Gauge 2-3/4 inch": [25],
    "20 Gauge 3 inch": [25],
    "16 Gauge 2-3/4 inch": [25],
    "12 Gauge 2-3/4 inch": [10, 25],
    "12 Gauge 3 inch": [10, 25],
    "10 Gauge 3-1/2 inch": [25]
  }
};
  
const colors = {
  "Black": "#000000",
  "OD Green": "#4b5320",
  "FDE": "#c2b280",
  "Gray": "#888888",
  "White": "#f5f5f5",
  "Red": "#b22222",
  "Blue": "#1f4e79"
};
  
const selections = {};

// GENERIC SELECT HANDLER
function selectHandler(container, key) {
  container.querySelectorAll(".card").forEach(card => {
    card.onclick = () => {
      container.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      selections[key] = card.dataset.value;
      updateSummary();

      if (key === "category") loadCalibers();
      if (key === "caliber") loadCapacity();
    };
  });
}

// LOAD CALIBERS
function loadCalibers() {
  const container = document.getElementById("caliber");
  container.innerHTML = "";

  const calibers = Object.keys(products[selections.category] || {});
  calibers.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.value = c;
    div.innerText = c;
    container.appendChild(div);
  });

  selectHandler(container, "caliber");
}

// LOAD CAPACITY
function loadCapacity() {
  const container = document.getElementById("capacity");
  container.innerHTML = "";

  const caps = products[selections.category][selections.caliber] || [];
  caps.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.value = c;
    div.innerText = c + " rounds";
    container.appendChild(div);
  });

  selectHandler(container, "capacity");
}

// LOAD COLORS
function loadColors(id, key) {
  const container = document.getElementById(id);

  Object.entries(colors).forEach(([name, val]) => {
    const div = document.createElement("div");
    div.className = "color-swatch";
    div.style.background = val;
    div.dataset.value = name;

    div.onclick = () => {
      container.querySelectorAll(".color-swatch")
        .forEach(c => c.classList.remove("selected"));
      div.classList.add("selected");
      selections[key] = name;
      updateSummary();
    };

    container.appendChild(div);
  });
}

// SUMMARY
function updateSummary() {
    const notes = document.getElementById("notes").value || "";

  document.getElementById("summaryText").innerHTML = `
    Category: ${selections.category || "-"}<br>
    Caliber: ${selections.caliber || "-"}<br>
    Capacity: ${selections.capacity ? selections.capacity + " rounds" : "-"}<br>
    Box: ${selections.boxColor || "-"}<br>
    Text: ${selections.textColor || "-"}<br>
    Notes: ${notes || "-"}
  `;
}

// SUBMIT
async function submitOrder() {
  const order = {
    ...selections,
    notes: document.getElementById("notes").value
  };

  await fetch("/api/order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(order)
  });

  alert("Order submitted. We’ll confirm details shortly.");
}

// INIT
selectHandler(document.getElementById("category"), "category");
loadColors("boxColor", "boxColor");
loadColors("textColor", "textColor");

  document.getElementById("notes").addEventListener("input", updateSummary);
  
</script>

</body>
</html>
